# Esempio di workflow GitHub Actions che notifica Diffinder all'apertura di una PR verso `main` (prod).
# Salvalo nel repo target come .github/workflows/diffinder-cert-check.yml
name: diffinder-cert-check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  notify-diffinder:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload and signature
        id: payload
        run: |
          PAYLOAD=$(jq -nc \
            --arg repo "https://github.com/${{ github.repository }}" \
            --argjson pr_number ${{ github.event.pull_request.number }} \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg base_branch "${{ github.event.pull_request.base.ref }}" \
            --arg head_branch "${{ github.event.pull_request.head.ref }}" \
            --arg pr_url "${{ github.event.pull_request.html_url }}" \
            '{repo:$repo, pr_number:$pr_number, head_sha:$head_sha, base_branch:$base_branch, head_branch:$head_branch, pr_url:$pr_url}')
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DIFFINDER_WEBHOOK_SECRET }}" -hex | awk '{print $2}')
          echo "payload=$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "sig=sha256=$SIG" >> "$GITHUB_OUTPUT"

      - name: Call Diffinder webhook
        id: call
        run: |
          set -e
          RESPONSE=$(curl -sS -X POST "${{ secrets.DIFFINDER_URL }}/api/webhooks/github/pr" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${{ steps.payload.outputs.sig }}" \
            -d '${{ steps.payload.outputs.payload }}')
          echo "Response: $RESPONSE"
          PASSED=$(echo "$RESPONSE" | jq -r '.passed')
          REASON=$(echo "$RESPONSE" | jq -r '.reason')
          if [ "$PASSED" != "true" ]; then
            echo "::error::Cert check failed: $REASON"
            exit 1
          fi
